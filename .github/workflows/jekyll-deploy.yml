name: Jekyll Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: "Deployment environment: staging or production"
        required: true
        type: string
      production-url:
        description: "Canonical URL for production Deployment status (e.g. https://opennews.org)"
        required: false
        type: string
        default: ""
      aws-region:
        description: "AWS region"
        required: false
        type: string
        default: "us-east-1"
      run-checks:
        description: "Run bundle exec rake check"
        required: false
        type: boolean
        default: true
      run-tests:
        description: "Run bundle exec rake test after build"
        required: false
        type: boolean
        default: true
    secrets:
      AWS_ROLE_ARN:
        required: true

permissions:
  contents: read
  id-token: write
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Build Jekyll site
        uses: OpenNews/opennews-actions/jekyll-build@v1
        with:
          run-checks: ${{ inputs.run-checks }}
          run-tests: ${{ inputs.run-tests }}

      - name: Extract deployment config from _config.yml
        id: config
        shell: bash
        run: |
          mapfile -t DEPLOYMENT_VALUES < <(ruby -ryaml -e "
            config = YAML.safe_load_file('_config.yml', permitted_classes: [], aliases: true)
            deployment = config['deployment'] || {}
            puts deployment['bucket'].to_s
            puts deployment['staging_bucket'].to_s
            puts deployment['cloudfront_distribution_id'].to_s
          ")
          BUCKET="${DEPLOYMENT_VALUES[0]}"
          STAGING_BUCKET="${DEPLOYMENT_VALUES[1]}"
          CLOUDFRONT="${DEPLOYMENT_VALUES[2]}"

          if [ "${{ inputs.environment }}" = "staging" ]; then
            DEPLOY_BUCKET="$STAGING_BUCKET"
          else
            DEPLOY_BUCKET="$BUCKET"
          fi

          if [ -z "$DEPLOY_BUCKET" ]; then
            echo "Error: bucket not configured for ${{ inputs.environment }}. Please set deployment.bucket (production) or deployment.staging_bucket (staging) in _config.yml." >&2
            exit 1
          fi

          echo "deploy_bucket=$DEPLOY_BUCKET" >> $GITHUB_OUTPUT
          echo "cloudfront=$CLOUDFRONT" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}
          role-session-name: Deploy-${{ github.event.repository.name }}-${{ github.run_id }}

      - name: Create GitHub Deployment
        id: deployment
        uses: actions/github-script@v8
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: '${{ inputs.environment }}',
              description: `Deploy ${{ inputs.environment }} site to S3`,
              auto_merge: false,
              required_contexts: []
            });
            return deployment.data.id;

      - name: Deploy to S3
        shell: bash
        run: |
          aws s3 sync _site/ s3://${{ steps.config.outputs.deploy_bucket }} \
            --delete \
            --cache-control "public, max-age=3600"

      - name: Invalidate CloudFront
        if: inputs.environment == 'production' && steps.config.outputs.cloudfront != ''
        shell: bash
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.config.outputs.cloudfront }} \
            --paths "/*"

      - name: Update Deployment Status (Success)
        if: success()
        uses: actions/github-script@v8
        with:
          script: |
            const env = '${{ inputs.environment }}';
            const productionUrl = '${{ inputs.production-url }}';
            const environmentUrl = (env === 'production' && productionUrl)
              ? productionUrl
              : `http://${{ steps.config.outputs.deploy_bucket }}.s3-website-${{ inputs.aws-region }}.amazonaws.com`;

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.result }},
              state: 'success',
              environment_url: environmentUrl,
              description: '${{ inputs.environment }} deployment completed successfully'
            });

      - name: Update Deployment Status (Failure)
        if: failure() && steps.deployment.outputs.result
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.result }},
              state: 'failure',
              description: '${{ inputs.environment }} deployment failed'
            });
